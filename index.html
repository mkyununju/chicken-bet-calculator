<style>
  html, body { background: #262421 !important; margin: 0; padding: 0; }
</style>
<div style="max-width: 480px; margin: 0 auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; background: #1a1a1a; border-radius: 12px; color: #e8e8e8;">

  <h2 style="margin: 0 0 4px 0; font-size: 20px; font-weight: 600; color: #fff;">🐔 Chicken Bet Tool</h2>
  <p id="subtitle" style="margin: 0 0 20px 0; font-size: 13px; color: #999;">Using your exact solved optimal policy — no formula approximation.</p>

  <div style="display: flex; gap: 8px; margin-bottom: 20px; background: #222; padding: 4px; border-radius: 8px;">
    <button id="btnTabTrack" style="flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; background: #444; color: #fff;">Optimal Tracker</button>
    <button id="btnTabSim" style="flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: #999;">Simulation</button>
  </div>

  <div id="policyBanner" style="font-size: 11px; color: #8fbc8f; background: #1e2a1e; border: 1px solid #2a3a2a; border-radius: 8px; padding: 8px 10px; margin-bottom: 16px;"></div>

  <!-- ===================== TRACKER TAB ===================== -->
  <div id="trackerTab">

    <!-- SETUP VIEW -->
    <div id="setupView">
      <div style="margin-bottom: 16px;">
        <label style="display: block; font-size: 13px; color: #bbb; margin-bottom: 6px;">Starting cash</label>
        <input id="setupCash" type="number" value="50000" min="0" step="1"
          style="width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 15px; border-radius: 8px; border: 1px solid #444; background: #262626; color: #fff;">
      </div>
      <div style="margin-bottom: 20px;">
        <label style="display: block; font-size: 13px; color: #bbb; margin-bottom: 6px;">Starting streak (usually 0)</label>
        <input id="setupStreak" type="number" value="0" min="0" step="1"
          style="width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 15px; border-radius: 8px; border: 1px solid #444; background: #262626; color: #fff;">
      </div>
      <button id="btnStart" style="width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: #4a7a4a; color: #fff;">Start Tracking</button>
    </div>

    <!-- TRACKING VIEW -->
    <div id="trackView" style="display:none;">
      <div style="display:flex; gap:10px; margin-bottom: 16px;">
        <div style="flex:1; background:#222; border-radius:8px; padding:12px; text-align:center;">
          <div style="font-size:11px; color:#999; text-transform:uppercase; letter-spacing:0.5px;">Cash</div>
          <div id="curCash" style="font-size:20px; font-weight:700; color:#fff; margin-top:2px;">-</div>
        </div>
        <div style="flex:1; background:#222; border-radius:8px; padding:12px; text-align:center;">
          <div style="font-size:11px; color:#999; text-transform:uppercase; letter-spacing:0.5px;">Streak</div>
          <div id="curStreak" style="font-size:20px; font-weight:700; color:#fff; margin-top:2px;">-</div>
        </div>
      </div>

      <div style="background:#1e2a1e; border:1px solid #2a3a2a; border-radius:8px; padding:12px; text-align:center; margin-bottom:16px;">
        <div style="font-size:11px; color:#8fbc8f; text-transform:uppercase; letter-spacing:0.5px;">Chance of reaching goal from here</div>
        <div id="successProb" style="font-size:24px; font-weight:700; color:#fff; margin-top:2px;">-</div>
      </div>

      <div id="result" style="background: linear-gradient(135deg, #2a3a2a, #1e2a1e); border: 1px solid #3a5a3a; border-radius: 10px; padding: 16px; text-align: center; margin-bottom: 12px;">
        <div style="font-size: 11px; color: #8fbc8f; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;">Optimal bet (edit if you bet differently)</div>
        <input id="betAmount" type="number" value="0" min="0" step="1"
          style="width: 140px; text-align:center; font-size: 26px; font-weight: 700; color: #fff; background: transparent; border: none; border-bottom: 2px solid #3a5a3a; padding: 4px;">
      </div>

      <div id="details" style="font-size: 12px; color: #888; line-height: 1.7; margin-bottom: 18px;"></div>

      <div style="display:flex; gap:10px; margin-bottom: 10px;">
        <button id="btnWin" style="flex:1; padding: 14px; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; background: #3a7a3a; color: #fff;">✓ I Won</button>
        <button id="btnLose" style="flex:1; padding: 14px; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; background: #7a3a3a; color: #fff;">✗ I Lost</button>
      </div>
      <div style="display:flex; gap:10px;">
        <button id="btnUndo" style="flex:1; padding: 10px; border: 1px solid #444; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: #ccc;">↺ Undo last bet</button>
        <button id="btnReset" style="flex:1; padding: 10px; border: 1px solid #444; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: #ccc;">⟲ Reset / New session</button>
      </div>

      <div style="margin-top:14px; font-size:11px; color:#666; text-align:center;" id="historyNote"></div>
    </div>
  </div>

  <!-- ===================== SIMULATION TAB ===================== -->
  <div id="simTab" style="display:none;">
    <div style="margin-bottom: 16px;">
      <label style="display: block; font-size: 13px; color: #bbb; margin-bottom: 6px;">Starting cash</label>
      <input id="simStartCash" type="number" value="50000" min="0" step="1"
        style="width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 15px; border-radius: 8px; border: 1px solid #444; background: #262626; color: #fff;">
    </div>
    <div style="margin-bottom: 16px; font-size: 12px; color: #999;" id="simGoalNote"></div>

    <details style="margin-bottom: 16px;">
      <summary style="cursor: pointer; font-size: 13px; color: #999;">Advanced settings</summary>
      <div style="margin-top: 10px; padding: 12px; background: #222; border-radius: 8px;">
        <label style="display: block; font-size: 12px; color: #999; margin-bottom: 4px;">Number of simulated runs (more = more accurate, slower)</label>
        <input id="simTrials" type="number" value="3000" step="500" min="200" max="20000"
          style="width: 100%; box-sizing: border-box; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #1e1e1e; color: #fff; font-size: 13px;">
      </div>
    </details>

    <button id="btnRunSim" style="width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: #4a7a4a; color: #fff; margin-bottom: 16px;">Run Simulation</button>

    <div id="simResult" style="display:none;">
      <div style="background: linear-gradient(135deg, #2a3a2a, #1e2a1e); border: 1px solid #3a5a3a; border-radius: 10px; padding: 18px; text-align: center; margin-bottom: 12px;">
        <div style="font-size: 12px; color: #8fbc8f; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;">Chance of reaching goal</div>
        <div id="simProb" style="font-size: 32px; font-weight: 700; color: #fff;">-</div>
      </div>
      <div id="simDetails" style="font-size: 13px; color: #ccc; line-height: 2;"></div>
    </div>

    <div id="simLoading" style="display:none; text-align:center; color:#999; font-size:13px; padding: 12px;">Running simulation...</div>
  </div>

</div>

// POLICY.cash_grid: array of cash values (grid points)
// POLICY.streak_grid: array of streak values 0..N
// POLICY.best_f: 2D array [cash_index][streak_index] -> optimal bet fraction
// POLICY.goal, POLICY.loss_fee: the exact target/fee this policy was solved for

function pOfS(s) {
  return Math.min(0.99, 0.50 + 0.01 * s);
}

// Linear interpolation of a value over the cash grid at a fixed streak index
function interpOverCashGrid(cash, column) {
  const grid = POLICY.cash_grid;
  const n = grid.length;
  if (cash <= grid[0]) return column[0];
  if (cash >= grid[n-1]) return column[n-1];
  // binary search for bracketing indices
  let lo = 0, hi = n - 1;
  while (hi - lo > 1) {
    const mid = (lo + hi) >> 1;
    if (grid[mid] <= cash) lo = mid; else hi = mid;
  }
  const x0 = grid[lo], x1 = grid[hi];
  const y0 = column[lo], y1 = column[hi];
  const t = (cash - x0) / (x1 - x0);
  return y0 + t * (y1 - y0);
}

function getOptimalFraction(cash, streak) {
  const maxStreak = POLICY.streak_grid[POLICY.streak_grid.length - 1];
  const si = Math.max(0, Math.min(maxStreak, Math.round(streak)));
  const column = POLICY.best_f.map(row => row[si]); // best_f[cash_idx][si]
  return interpOverCashGrid(cash, column);
}

function getSuccessProbability(cash, streak) {
  if (cash >= POLICY.goal) return 1.0;
  const maxStreak = POLICY.streak_grid.length - 1;
  const si = Math.max(0, Math.min(maxStreak, Math.round(streak)));
  const column = POLICY_V.map(row => row[si]);
  return interpOverCashGrid(cash, column);
}

function getOptimalBet(cash, streak) {
  const lossFee = POLICY.loss_fee;
  const f = getOptimalFraction(cash, streak);
  let bet = Math.max(100, Math.floor(cash * f));
  bet = Math.min(bet, cash - lossFee);
  return Math.max(100, bet);
}

// ============ TRACKER LOGIC ============
let cash = 0;
let streak = 0;
let history = [];
let started = false;

function refreshDisplay() {
  const lossFee = POLICY.loss_fee;

  document.getElementById('curCash').textContent = cash.toLocaleString();
  document.getElementById('curStreak').textContent = streak;
  document.getElementById('successProb').textContent = (getSuccessProbability(cash, streak) * 100).toFixed(2) + '%';

  const detailsEl = document.getElementById('details');
  const betInput = document.getElementById('betAmount');

  if (cash >= POLICY.goal) {
    betInput.value = 0;
    betInput.disabled = true;
    detailsEl.innerHTML = `<span style="color:#8fbc8f">🎉 Goal reached! No more betting needed.</span>`;
    document.getElementById('btnWin').disabled = true;
    document.getElementById('btnLose').disabled = true;
    return;
  }

  const cantAfford = (cash - lossFee) < 100;
  if (cantAfford) {
    betInput.value = 0;
    betInput.disabled = true;
    detailsEl.innerHTML = `<span style="color:#e88">Cash too low to safely cover the loss fee. Earn more before betting again.</span>`;
    document.getElementById('btnWin').disabled = true;
    document.getElementById('btnLose').disabled = true;
    return;
  }

  betInput.disabled = false;
  document.getElementById('btnWin').disabled = false;
  document.getElementById('btnLose').disabled = false;

  const p = pOfS(streak);
  const f = getOptimalFraction(cash, streak);
  const bet = getOptimalBet(cash, streak);
  betInput.value = bet;

  detailsEl.innerHTML = `
    <div>Win probability p(s): <strong style="color:#ccc">${(p*100).toFixed(1)}%</strong></div>
    <div>Optimal bet fraction (from solved policy): <strong style="color:#ccc">${(f*100).toFixed(2)}%</strong></div>
  `;

  document.getElementById('historyNote').textContent = history.length > 0
    ? `${history.length} bet${history.length===1?'':'s'} recorded this session`
    : 'No bets recorded yet';
}

function applyOutcome(won) {
  const betInput = document.getElementById('betAmount');
  const bet = parseFloat(betInput.value) || 0;
  const lossFee = POLICY.loss_fee;

  history.push({ cash, streak });

  if (won) {
    cash = cash + bet;
    streak = streak + 1;
  } else {
    cash = Math.max(0, cash - bet - lossFee);
    streak = 0;
  }
  refreshDisplay();
}

function undo() {
  if (history.length === 0) return;
  const prev = history.pop();
  cash = prev.cash;
  streak = prev.streak;
  refreshDisplay();
}

function startTracking() {
  cash = parseFloat(document.getElementById('setupCash').value) || 0;
  streak = parseFloat(document.getElementById('setupStreak').value) || 0;
  history = [];
  started = true;
  document.getElementById('setupView').style.display = 'none';
  document.getElementById('trackView').style.display = 'block';
  refreshDisplay();
}

function resetTracking() {
  started = false;
  history = [];
  document.getElementById('setupView').style.display = 'block';
  document.getElementById('trackView').style.display = 'none';
}

document.getElementById('btnStart').addEventListener('click', startTracking);
document.getElementById('btnWin').addEventListener('click', () => applyOutcome(true));
document.getElementById('btnLose').addEventListener('click', () => applyOutcome(false));
document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnReset').addEventListener('click', resetTracking);

// ============ SIMULATION LOGIC (uses the same solved policy) ============
function runOneAttempt(startCash, goal, lossFee, maxBets) {
  let C = startCash;
  let s = 0;
  for (let i = 0; i < maxBets; i++) {
    if (C >= goal) return { status: 'goal', bets: i };
    const bet = getOptimalBet(C, s);
    if (bet > C - lossFee) return { status: 'bust', bets: i };
    const p = pOfS(s);
    if (Math.random() < p) {
      C += bet; s += 1;
    } else {
      C -= (bet + lossFee); s = 0;
      if (C <= 100) return { status: 'bust', bets: i };
    }
  }
  return { status: 'timeout', bets: maxBets };
}

function runSimulation() {
  const startCash = parseFloat(document.getElementById('simStartCash').value) || 0;
  const goal = POLICY.goal;
  const lossFee = POLICY.loss_fee;
  const trials = Math.min(20000, Math.max(200, parseInt(document.getElementById('simTrials').value) || 3000));
  const maxBets = 20000;

  document.getElementById('simLoading').style.display = 'block';
  document.getElementById('simResult').style.display = 'none';
  document.getElementById('btnRunSim').disabled = true;

  setTimeout(() => {
    let successes = 0;
    let busts = 0;
    let timeouts = 0;
    const betsOnSuccess = [];

    for (let t = 0; t < trials; t++) {
      const res = runOneAttempt(startCash, goal, lossFee, maxBets);
      if (res.status === 'goal') { successes++; betsOnSuccess.push(res.bets); }
      else if (res.status === 'bust') { busts++; }
      else { timeouts++; }
    }

    const prob = successes / trials;
    betsOnSuccess.sort((a,b) => a-b);
    const avgBets = betsOnSuccess.length ? betsOnSuccess.reduce((a,b)=>a+b,0)/betsOnSuccess.length : null;
    const medianBets = betsOnSuccess.length ? betsOnSuccess[Math.floor(betsOnSuccess.length/2)] : null;

    document.getElementById('simProb').textContent = (prob*100).toFixed(1) + '%';
    document.getElementById('simDetails').innerHTML = `
      <div>Simulated runs: <strong style="color:#fff">${trials.toLocaleString()}</strong></div>
      <div>Reached goal: <strong style="color:#8fbc8f">${successes.toLocaleString()}</strong> &nbsp;|&nbsp; Went broke: <strong style="color:#e88">${busts.toLocaleString()}</strong>${timeouts ? ` &nbsp;|&nbsp; Still going at cutoff: <strong style="color:#999">${timeouts.toLocaleString()}</strong>` : ''}</div>
      <div style="margin-top:8px; padding-top:8px; border-top:1px solid #333;">Avg bets needed (successful runs): <strong style="color:#fff">${avgBets !== null ? avgBets.toFixed(0) : '-'}</strong></div>
      <div>Median bets needed: <strong style="color:#fff">${medianBets !== null ? medianBets : '-'}</strong></div>
    `;

    document.getElementById('simLoading').style.display = 'none';
    document.getElementById('simResult').style.display = 'block';
    document.getElementById('btnRunSim').disabled = false;
  }, 50);
}

document.getElementById('btnRunSim').addEventListener('click', runSimulation);
</script>
